<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>나의 성장 스토리</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background-color:skyblue;

    border:12px solid purple;

    min-height:100vh;

    font-family:"맑은 고딕",sans-serif;
}

/* 전체 영역 */

.container{

    width:100%;

    text-align:center;

    padding:40px 0 60px;
}

/* 이미지 */

.image{

    width:256px;

    height:384px;

    object-fit:cover;

    border:5px solid white;

    border-radius:15px;

    box-shadow:0 0 20px rgba(0,0,0,0.35);

    display:block;

    margin:auto;
}

/* 이미지 사이의 흰색 선 */

.divider{

    width:80%;

    border-top:4px double white;

    margin:45px auto;
}

</style>

</head>

<body>

<div class="container">

    <!-- 첫 번째 이미지 -->
    <img class="image"
         src="ChatGPT Image Jun 30, 2026, 10_31_59 AM.png"
         alt="첫 번째 이미지">

    <div class="divider"></div>

    <!-- 두 번째 이미지 -->
    <img class="image"
         src="https://raw.githubusercontent.com/wizmong69/ax/main/yuna.png"
         alt="Yuna">

    <div class="divider"></div>

    <!-- 세 번째 이미지 -->
    <img class="image"
         src="선비스타일.png"
         alt="선비">

    <div class="divider"></div>

    <!-- 네 번째 이미지 -->
    <img class="image"
         src="장군스타일.png"
         alt="장군">

</div>

</body>
</html>
